services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fat_free_crm_development
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: fat_free_crm_development
      DB_SSLMODE: disable
      LOG_LEVEL: info
    depends_on:
      - db

volumes:
  pgdata:
